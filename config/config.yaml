# JIRA Timesheet Generator Configuration

# Time constraints
timeSettings:
  weeklyHours: 40
  dailyHours: 8
  workDays:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday

# Project mappings - map JIRA projects to timesheet project codes
projects:
  # WBSO Project - R&D subsidy requiring auditable documentation
  - code: "12291"
    name: "WBSO 2026 Skipum: 2601 Clean-Core SAP Add-On for Multi-Platform Landscapes"
    jiraProjects:
      - "COSSCLEAN"
    targetAllocation: 0.50
    isWBSO: true

  # Non-WBSO Internal Project
  - code: "12241"
    name: "ShipExec For ECC/EWM - Software Development 2026"
    jiraProjects:
      - "SHIPEXEC"
      - "EWM"
      - "NSHIFT"
    targetAllocation: 0.50
    isDefault: true
    # Default entries when no JIRA activity exists for this project
    defaultEntries:
      - description: "Administration"
        hoursPerWeek: 3
      - description: "Clean Core Project Development and Guidance"
        hoursPerWeek: 17

# Activity weighting (higher = more important for hour allocation)
activityWeights:
  worklog: 10
  transition: 5
  comment: 3
  update: 2
  assignment: 4

# Output settings
output:
  defaultFormat: excel
  directory: "./output"
  filenameTemplate: "timesheet-{year}-W{week}"
